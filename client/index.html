<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta content="IE=edge"
          http-equiv="X-UA-Compatible"/>
    <meta content="width=device-width, initial-scale=1.0"
          name="viewport"/>
    <!-- Fontawesome -->
    <link
            href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css"
            rel="stylesheet"
    />
    <!-- Bootswatch flatly Theme -->
    <link
            href="https://stackpath.bootstrapcdn.com/bootswatch/4.5.2/flatly/bootstrap.min.css"
            rel="stylesheet"
    />
    <title>JS Todo List</title>
    <style>
        /* Ajustes para mejorar el contraste y flexbox */
        .todo-container {
            max-width: 800px;
            margin-top: 50px;
        }
        
        .table-responsive {
            border-radius: 8px;
            overflow: hidden;
        }
        
        .d-flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand font-weight-bold"
           href="#">JS ToDo List</a>
    </div>
</nav>
<div class="container todo-container shadow-sm p-4 bg-dark rounded">
    <div class="d-flex-between mb-4 flex-wrap">
        <h2 class="text-secondary">Mis Tareas</h2>
        <form class="d-flex align-items-center"
              id="filters">
            <input
                    class="form-control form-control-sm mr-2"
                    id="words"
                    name="words"
                    placeholder="Buscar..."
                    type="text"
            />
            <button
                    class="btn btn-outline-primary btn-sm"
                    id="search"
                    type="submit"
            >
                Filtrar
            </button>
        </form>
    </div>
    <div class="alert d-none"
         id="alert"></div>
    <div class="jumbotron p-4 border">
        <div class="row align-items-end"
             id="add-todo-form">
            <div class="col-sm-4 mb-2">
                <label class="font-weight-bold">Título</label>
                <input
                        class="form-control"
                        id="title"
                        placeholder="Ej: Estudiar"
                        type="text"
                />
            </div>
            <div class="col-sm-6 mb-2">
                <label class="font-weight-bold">Descripción</label>
                <input
                        class="form-control"
                        id="description"
                        placeholder="¿Qué hay que hacer?"
                        type="text"
                />
            </div>
            <div class="col-sm-2 mb-2">
                <button class="btn btn-success btn-block"
                        id="add">
                    <i class="fa fa-plus"></i>
                </button>
            </div>
        </div>
    </div>
    <div class="table-responsive">
        <table class="table table-hover border justify-content-start"
               id="table">
            <thead class="thead-light">
            <tr>
                <th scope="col">Tarea</th>
                <th class="d-none d-md-table-cell"
                    scope="col">Descripción
                </th>
                <th class="text-center"
                    scope="col">Estado
                </th>
                <th scope="col">Acciones</th>
            </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>
<div class="modal fade"
     id="modal"
     role="dialog"
     tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title">Editar Tarea</h5>
                <button class="close text-white"
                        data-dismiss="modal"
                        type="button">
                    &times;
                </button>
            </div>
            <div class="modal-body">
                <div class="alert d-none"
                     id="modal-alert"></div>
                <div class="form-group">
                    <label>Título</label>
                    <input class="form-control"
                           id="modal-title"
                           type="text"/>
                </div>
                <div class="form-group">
                    <label>Descripción</label>
                    <textarea
                            class="form-control"
                            id="modal-description"
                            rows="3"
                    ></textarea>
                </div>
                <div class="custom-control custom-checkbox">
                    <input
                            class="custom-control-input"
                            id="modal-completed"
                            type="checkbox"
                    />
                    <label class="custom-control-label"
                           for="modal-completed"
                    >Completada</label
                    >
                </div>
            </div>
            <div class="modal-footer">
                <button
                        class="btn btn-secondary"
                        data-dismiss="modal"
                        type="button"
                >
                    Cancelar
                </button>
                <button class="btn btn-primary"
                        id="modal-btn"
                        type="button">
                    Guardar Cambios
                </button>
            </div>
        </div>
    </div>
</div>
<!-- JQuery -->
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
<!-- Bootstrap -->
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
<!-- Optional runtime API base URL override -->
<script>
    // Example for production: window.__API_BASE_URL__ = "https://your-api-domain.vercel.app/api/tasks";
    window.__API_BASE_URL__ = window.__API_BASE_URL__ || "";
</script>
<!-- JS Code -->
<script src="js/index.js"
        type="module"></script>
</body>
</html>
