<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Fontawesome -->
    <link
      href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css"
      rel="stylesheet"
    />
    <!-- Bootswatch flatly Theme -->
    <link
      href="https://stackpath.bootstrapcdn.com/bootswatch/4.5.2/flatly/bootstrap.min.css"
      rel="stylesheet"
    />
    <title>JS Todo List</title>
    <style>
      /* Ajustes para mejorar el contraste y flexbox */
      .todo-container {
        max-width: 800px;
        margin-top: 50px;
      }
      .table-responsive {
        border-radius: 8px;
        overflow: hidden;
      }
      .d-flex-between {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
    </style>
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
      <div class="container">
        <a class="navbar-brand font-weight-bold" href="#">JS ToDo List</a>
      </div>
    </nav>

    <div class="container todo-container shadow-sm p-4 bg-dark rounded">
      <div class="d-flex-between mb-4 flex-wrap">
        <h2 class="text-secondary">Mis Tareas</h2>
        <form id="filters" class="d-flex align-items-center">
          <input
            type="text"
            name="words"
            id="words"
            class="form-control form-control-sm mr-2"
            placeholder="Buscar..."
          />
          <button
            id="search"
            class="btn btn-outline-primary btn-sm"
            type="submit"
          >
            Filtrar
          </button>
        </form>
      </div>

      <div id="alert" class="alert d-none"></div>

      <div class="jumbotron p-4 border">
        <div class="row align-items-end" id="add-todo-form">
          <div class="col-sm-4 mb-2">
            <label class="font-weight-bold">Título</label>
            <input
              type="text"
              id="title"
              class="form-control"
              placeholder="Ej: Estudiar"
            />
          </div>
          <div class="col-sm-6 mb-2">
            <label class="font-weight-bold">Descripción</label>
            <input
              type="text"
              id="description"
              class="form-control"
              placeholder="¿Qué hay que hacer?"
            />
          </div>
          <div class="col-sm-2 mb-2">
            <button id="add" class="btn btn-success btn-block">
              <i class="fa fa-plus"></i>
            </button>
          </div>
        </div>
      </div>

      <div class="table-responsive">
        <table id="table" class="table table-hover border justify-content-start">
          <thead class="thead-light">
            <tr>
              <th scope="col">Tarea</th>
              <th scope="col" class="d-none d-md-table-cell">Descripción</th>
              <th scope="col" class="text-center">Estado</th>
              <th scope="col">Acciones</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <div class="modal fade" id="modal" tabindex="-1" role="dialog">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header bg-primary text-white">
            <h5 class="modal-title">Editar Tarea</h5>
            <button type="button" class="close text-white" data-dismiss="modal">
              &times;
            </button>
          </div>
          <div class="modal-body">
            <div id="modal-alert" class="alert d-none"></div>
            <div class="form-group">
              <label>Título</label>
              <input id="modal-title" type="text" class="form-control" />
            </div>
            <div class="form-group">
              <label>Descripción</label>
              <textarea
                id="modal-description"
                class="form-control"
                rows="3"
              ></textarea>
            </div>
            <div class="custom-control custom-checkbox">
              <input
                type="checkbox"
                class="custom-control-input"
                id="modal-completed"
              />
              <label class="custom-control-label" for="modal-completed"
                >Completada</label
              >
            </div>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-dismiss="modal"
            >
              Cancelar
            </button>
            <button type="button" id="modal-btn" class="btn btn-primary">
              Guardar Cambios
            </button>
          </div>
        </div>
      </div>
    </div>
    <!-- JQuery -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <!-- Bootstrap -->
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <!-- JS Code -->
    <script src="js/index.js" type="module"></script>
  </body>
</html>
